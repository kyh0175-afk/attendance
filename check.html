<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>코스모스 독서시간 — 내 출석 확인</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=./v2/?mode=check">
<link rel="canonical" href="./v2/?mode=check">
<script>
  location.replace('./v2/?mode=check');
</script>
<style>
  body {
    font-family: 'IBM Plex Sans KR', -apple-system, system-ui, sans-serif;
    background: #2a1f15;
    color: #f4e8d0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    text-align: center;
  }
  .box {
    max-width: 420px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 48px;
    font-weight: 500;
    color: #f4e8d0;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .sub {
    font-size: 14px;
    color: #a89880;
    margin-bottom: 32px;
    letter-spacing: 0.02em;
  }
  .msg {
    font-size: 15px;
    color: #e8dcc4;
    margin-bottom: 20px;
    line-height: 1.7;
  }
  a {
    display: inline-block;
    padding: 12px 24px;
    background: transparent;
    color: #d6b27c;
    border: 1px solid #d6b27c;
    border-radius: 2px;
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  a:hover {
    background: rgba(214, 178, 124, 0.1);
  }
  .note {
    margin-top: 24px;
    font-size: 12px;
    color: #6b5d4a;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="box">
  <h1>Cosmos</h1>
  <div class="sub">내 출석 확인</div>
  <div class="msg">
    새 주소로 이동 중입니다.<br>
    자동으로 이동되지 않으면 아래 버튼을 눌러주세요.
  </div>
  <a href="./v2/?mode=check">내 출석 확인하기 →</a>
  <div class="note">REDIRECT · v1 → v2</div>
</div>
</body>
</html>
