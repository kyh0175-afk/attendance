<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>코스모스 출석</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a130c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="코스모스 출석">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap">

<style>
  :root {
    --bg:#f4efe6; --bg2:#efe7d9; --card:#fffdf8; --ink:#2a2018; --ink2:#5a4d3e;
    --sub:#9a8975; --line:#ece4d5; --line2:#e2d8c6;
    --brand:#5b4433;          /* 딥 에스프레소 — 주 버튼/텍스트 */
    --lamp:#c7994f;           /* 램프 골드 — 시그니처 액센트 */
    --lamp-soft:#e6c98a;
    --ok:#3c7d5f; --ok-bg:#e7f1ea; --warn:#b57a2e; --warn-bg:#f6ecda; --err:#b34a3a;
    --r:16px; --r-lg:22px;
    --ease:cubic-bezier(.22,1,.36,1);   /* 스프링 이즈아웃 */
    --shadow:0 4px 18px rgba(60,42,24,.07), 0 1px 3px rgba(60,42,24,.05);
    --shadow-lg:0 12px 40px rgba(80,56,30,.12);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body {
    font-family:'IBM Plex Sans KR',system-ui,-apple-system,sans-serif;
    color:var(--ink); line-height:1.55; -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(120% 80% at 50% -10%, #fbf7ee 0%, var(--bg) 46%, var(--bg2) 100%) fixed;
    min-height:100dvh; overflow-x:hidden;
  }
  .app { max-width:440px; margin:0 auto; padding:0 20px calc(28px + env(safe-area-inset-bottom)); min-height:100dvh; }

  /* ── 상단 워드마크 ── */
  .top { padding:26px 2px 8px; }
  .top .en { font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600; font-size:19px; color:var(--lamp); letter-spacing:.04em; }

  /* ── 뷰 전환 (버터 스무스) ── */
  .view { display:none; }
  .view.on { display:block; }
  .view.enter { animation:viewIn .42s var(--ease) both; }
  @keyframes viewIn { from { opacity:0; transform:translateY(14px) scale(.99); } to { opacity:1; transform:none; } }

  /* ── 카드 ── */
  .card { background:var(--card); border:1px solid var(--line); border-radius:var(--r-lg); box-shadow:var(--shadow); padding:24px 22px; }
  .card + .card { margin-top:14px; }

  /* ── 로그인 / PIN ── */
  .lead { margin:34px 2px 22px; }
  .lead h1 { font-size:25px; font-weight:700; margin:0 0 8px; letter-spacing:-.01em; }
  .lead p { font-size:14.5px; color:var(--sub); margin:0; }
  .field { position:relative; margin-top:16px; }
  .field label { display:block; font-size:12.5px; font-weight:600; color:var(--ink2); margin:0 0 7px 2px; }
  input {
    width:100%; padding:16px; font-size:18px; font-family:inherit; font-weight:500; color:var(--ink);
    background:#fdfbf6; border:1.5px solid var(--line2); border-radius:var(--r); outline:none;
    transition:border-color .18s var(--ease), box-shadow .18s var(--ease), background .18s;
    -moz-appearance:textfield;
  }
  input::placeholder { color:#c3b6a2; font-weight:400; }
  input:focus { border-color:var(--lamp); background:#fff; box-shadow:0 0 0 4px rgba(199,153,79,.14); }

  /* ── 버튼 (촉각) ── */
  .btn {
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; margin-top:22px; padding:16px; font-size:16.5px; font-weight:600; font-family:inherit;
    color:#fdf8ee; background:var(--brand); border:none; border-radius:var(--r); cursor:pointer;
    transition:transform .12s var(--ease), box-shadow .2s, opacity .2s, background .2s;
    box-shadow:0 6px 18px rgba(91,68,51,.22); letter-spacing:.01em; touch-action:manipulation;
  }
  .btn:active { transform:scale(.972); box-shadow:0 3px 10px rgba(91,68,51,.18); }
  .btn:disabled { opacity:.5; box-shadow:none; }
  .btn.ghost { background:transparent; color:var(--sub); box-shadow:none; font-weight:500; font-size:14.5px; margin-top:18px; padding:12px; }
  .btn.ghost:active { transform:scale(.98); background:rgba(90,77,62,.05); }

  /* ── 대시보드 ── */
  .greet { display:flex; align-items:flex-end; justify-content:space-between; margin:30px 2px 20px; }
  .greet .who { font-size:23px; font-weight:700; letter-spacing:-.01em; }
  .greet .who b { color:var(--brand); }
  .greet .no { font-size:12px; color:var(--sub); font-variant-numeric:tabular-nums; padding-bottom:5px; }

  /* 입실/퇴실 버튼 */
  .check-row { display:flex; gap:11px; margin-bottom:14px; }
  .check-btn {
    flex:1; padding:18px 0; font-size:17px; font-weight:700; font-family:inherit; border-radius:var(--r);
    cursor:pointer; touch-action:manipulation; transition:transform .12s var(--ease), box-shadow .2s, background .2s;
    border:1.5px solid transparent;
  }
  .check-btn:active { transform:scale(.97); }
  .check-btn.in { color:#fdf8ee; background:var(--brand); box-shadow:0 6px 16px rgba(91,68,51,.2); }
  .check-btn.out { color:var(--brand); background:#fff; border-color:var(--line2); }
  .check-btn.out:active { background:#fbf7ef; }

  /* 바텀 시트 */
  .sheet-bg {
    position:fixed; inset:0; background:rgba(30,20,10,.34); backdrop-filter:blur(2px);
    opacity:0; pointer-events:none; transition:opacity .28s var(--ease); z-index:60;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .sheet-bg.on { opacity:1; pointer-events:auto; }
  .sheet {
    width:100%; max-width:440px; background:var(--card); border-radius:24px 24px 0 0;
    padding:12px 22px calc(26px + env(safe-area-inset-bottom)); box-shadow:0 -8px 40px rgba(40,28,14,.2);
    transform:translateY(100%); transition:transform .34s var(--ease);
  }
  .sheet-bg.on .sheet { transform:none; }
  .sheet-grip { width:38px; height:4px; border-radius:99px; background:var(--line2); margin:0 auto 16px; }
  .sheet-title { font-size:18px; font-weight:700; text-align:center; }
  .sheet-sub { font-size:13px; color:var(--sub); text-align:center; margin:5px 0 18px; }
  .code-input {
    width:100%; text-align:center; font-size:38px; font-weight:700; letter-spacing:.32em; font-variant-numeric:tabular-nums;
    padding:16px 10px; border:1.5px solid var(--line2); border-radius:var(--r); background:#fdfbf6; color:var(--ink); outline:none;
    transition:border-color .18s, box-shadow .18s;
  }
  .code-input:focus { border-color:var(--lamp); box-shadow:0 0 0 4px rgba(199,153,79,.14); background:#fff; }
  .code-input::placeholder { color:#d8cbb6; letter-spacing:.32em; }

  /* 히어로 — 이번 달 출석 */
  .hero {
    border-radius:var(--r-lg);
    background:#31241a; color:#f6ead2;
    padding:30px 24px 28px; box-shadow:var(--shadow);
  }
  .hero-label { font-size:13px; font-weight:500; color:#cbb590; letter-spacing:.03em; }
  .hero-num { margin:4px 0 2px; font-weight:700; line-height:1; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
  .hero-num .n { font-size:66px; color:#fbf1dc; }
  .hero-num .u { font-size:24px; font-weight:600; color:var(--lamp); margin-left:4px; }
  .hero-sub { margin-top:8px; font-size:13.5px; color:#bda98a; }
  .hero-sub b { color:var(--lamp-soft); font-weight:600; font-variant-numeric:tabular-nums; }

  /* 로그 */
  .log-head { display:flex; align-items:center; justify-content:space-between; margin:0 2px 14px; }
  .log-head h2 { font-size:15px; font-weight:600; margin:0; }
  .log-head .cnt { font-size:12px; color:var(--sub); }
  ul.log { list-style:none; margin:0; padding:0; }
  ul.log li { display:flex; align-items:center; gap:12px; padding:14px 2px; border-bottom:1px solid var(--line); }
  ul.log li:last-child { border-bottom:none; }
  ul.log .dot { width:7px; height:7px; border-radius:50%; background:var(--lamp); flex:none; }
  ul.log .dot.miss { background:var(--warn); }
  ul.log .meta { flex:1; min-width:0; }
  ul.log .d { font-size:14.5px; font-weight:600; font-variant-numeric:tabular-nums; }
  ul.log .p { font-size:12.5px; color:var(--sub); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  ul.log .badge { font-size:11px; font-weight:600; padding:4px 9px; border-radius:999px; flex:none; }
  ul.log .badge.ok { background:var(--ok-bg); color:var(--ok); }
  ul.log .badge.warn { background:var(--warn-bg); color:var(--warn); }
  .empty { text-align:center; color:var(--sub); padding:30px 0; font-size:14px; }

  /* 스켈레톤 로딩 */
  .skel { border-radius:12px; background:linear-gradient(100deg,#efe7d8 30%,#f6f0e5 50%,#efe7d8 70%); background-size:200% 100%; animation:sh 1.3s linear infinite; }
  @keyframes sh { to { background-position:-200% 0; } }
  .boot { padding-top:24px; }
  .boot .b1 { height:150px; } .boot .b2 { height:64px; margin-top:14px; } .boot .b3 { height:150px; margin-top:14px; }

  /* 토스트 */
  .toast {
    position:fixed; left:50%; bottom:calc(28px + env(safe-area-inset-bottom)); transform:translate(-50%,18px);
    background:var(--ink); color:#fdf8ee; padding:13px 20px; border-radius:14px; font-size:14px; font-weight:500;
    opacity:0; pointer-events:none; transition:.26s var(--ease); max-width:88vw; text-align:center; z-index:50;
    box-shadow:0 10px 30px rgba(30,20,10,.3);
  }
  .toast.on { opacity:1; transform:translate(-50%,0); }
  .toast.ok { background:var(--ok); } .toast.err { background:var(--err); }

  @media (prefers-reduced-motion:reduce) {
    .view.enter { animation:none; } .skel { animation:none; } * { transition-duration:.01ms !important; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top"><span class="en">Cosmos</span></div>

  <!-- 부팅 스켈레톤 -->
  <div id="view-loading" class="view on boot">
    <div class="skel b1"></div><div class="skel b2"></div><div class="skel b3"></div>
  </div>

  <!-- 로그인 -->
  <div id="view-login" class="view">
    <div class="lead">
      <h1>안녕하세요 👋</h1>
      <p>학번과 PIN으로 로그인해요. 처음이면 안내받은 PIN을 넣어주세요.</p>
    </div>
    <div class="card">
      <div class="field">
        <label for="login-hakbun">학번</label>
        <input id="login-hakbun" type="tel" inputmode="numeric" autocomplete="username" placeholder="10203" maxlength="6">
      </div>
      <div class="field">
        <label for="login-pin">PIN</label>
        <input id="login-pin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="숫자 4~6자리">
      </div>
      <button id="login-btn" class="btn">로그인</button>
    </div>
  </div>

  <!-- PIN 변경 -->
  <div id="view-pin" class="view">
    <div class="lead">
      <h1>새 PIN 설정</h1>
      <p>나만 아는 PIN으로 바꿔요. 다음부터 이 PIN으로 로그인해요.</p>
    </div>
    <div class="card">
      <div class="field">
        <label for="pin-new">새 PIN</label>
        <input id="pin-new" type="password" inputmode="numeric" autocomplete="new-password" placeholder="숫자 4~6자리">
      </div>
      <div class="field">
        <label for="pin-new2">한 번 더</label>
        <input id="pin-new2" type="password" inputmode="numeric" autocomplete="new-password" placeholder="새 PIN 확인">
      </div>
      <button id="pin-btn" class="btn">PIN 설정하기</button>
    </div>
  </div>

  <!-- 대시보드 -->
  <div id="view-dash" class="view">
    <div class="greet">
      <div class="who" id="dash-name">—</div>
      <div class="no">학번 <span id="dash-hakbun"></span></div>
    </div>

    <div class="check-row">
      <button class="check-btn in" id="btn-checkin">입실</button>
      <button class="check-btn out" id="btn-checkout">퇴실</button>
    </div>

    <div class="hero">
      <div class="hero-label">이번 달 출석</div>
      <div class="hero-num"><span class="n" id="stat-month">0</span><span class="u">번</span></div>
      <div class="hero-sub" id="hero-sub">전체 <b id="stat-total">0</b>번 나왔어요</div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="log-head"><h2>최근 기록</h2><span class="cnt" id="log-cnt"></span></div>
      <ul class="log" id="dash-list"></ul>
    </div>

    <button id="dash-logout" class="btn ghost">로그아웃</button>
  </div>
</div>

<!-- 입실/퇴실 코드 입력 시트 -->
<div class="sheet-bg" id="sheet-bg">
  <div class="sheet" id="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-title" id="sheet-title">입실 코드</div>
    <div class="sheet-sub" id="sheet-sub">칠판에 적힌 4자리 코드를 입력해요</div>
    <input id="code-input" class="code-input" type="tel" inputmode="numeric" maxlength="4" placeholder="0000" autocomplete="off">
    <button class="btn" id="code-submit">확인</button>
    <button class="btn ghost" id="code-cancel">닫기</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="assets/js/student.js"></script>
</body>
</html>
